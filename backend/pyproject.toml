[tool.ruff]
target-version = "py313"
line-length = 120

exclude = [
    ".git",
    "__pycache__",
    "*.egg-info",
    ".venv",
    "venv",
    "node_modules",
    ".aws-sam",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "G",
    "I",
    "N",
    "UP",
    "B",
    "SIM",
    "T20",
    "ERA",
]

ignore = [
    "E501",
    "B008",
]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"

[tool.mypy]
# Static type checking for the backend Lambda shared-services layer. This locks
# in the typed-boundary work (TypedDicts, Protocols, `str | None`) so it cannot
# silently regress. CI runs `mypy -p shared_services` from `backend/`.
#
# Scope note (future ratchet): the per-Lambda `lambda_function.py` handlers all
# share the same module name, which mypy cannot resolve in a single pass without
# per-directory invocation. The cohesive, uniquely-named `shared_services`
# package is the type-rigor surface and is what is checked here. Extending the
# check to the handlers (one mypy invocation per Lambda dir) is a future ratchet.
python_version = "3.13"
mypy_path = "lambdas/shared/python"
# Third-party Lambda-layer deps (boto3, requests, yaml, openai, ...) ship no
# stubs in this repo; missing imports are not the type errors we are guarding.
ignore_missing_imports = true
# Meaningful checks that are GREEN on the current tree at introduction. These
# run mypy's default analysis over typed call sites and signatures (catching the
# TypedDict / Protocol / `str | None` boundary regressions this guardrail exists
# to prevent) plus no-implicit-optional, redundant-cast, non-overlapping-equality
# (`strict_equality`), and TypedDict/`**`-unpacking consistency (`extra_checks`).
# Each was verified clean via `mypy -p shared_services` before being enabled;
# `extra_checks` in particular keeps the Phase-0 §7.5 SFN task-event TypedDicts
# (`shared_services/agent_task_events.py`) under stricter consistency checking.
warn_redundant_casts = true
no_implicit_optional = true
strict_equality = true
extra_checks = true
# NOTE: the following stricter checks are intentionally OFF — each surfaces
# pre-existing errors today and is a future ratchet (violation counts as of this
# change):
#   check_untyped_defs      (var-annotated on untyped-def locals)
#   warn_unused_ignores     (2 stale `# type: ignore` comments)
#   warn_unreachable        (4 pre-existing unreachable branches)
#   disallow_untyped_defs / strict mode

# Future ratchet: these modules carry pre-existing type errors (TypedDict
# mismatches, union-attr, arg-type) that predate this guardrail. They are
# excluded from error reporting so the check is GREEN at introduction per the
# audit's "guardrail must be green when added" rule. Fix the errors and remove
# each entry from this list to ratchet coverage up.
[[tool.mypy.overrides]]
module = [
    "errors.exceptions",
    "shared_services.activity_service",
    "shared_services.analytics_service",
    "shared_services.billing_service",
    "shared_services.edge_ingestion_service",
    "shared_services.edge_query_service",
    "shared_services.github_client",
    "shared_services.handler_utils",
    "shared_services.ingestion_service",
    "shared_services.notification_service",
    "shared_services.ragstack_client",
    "shared_services.relationship_scoring_service",
    "shared_services.send_time_service",
    "shared_services.tier_service",
    "shared_services.warm_intro_paths_service",
]
ignore_errors = true
