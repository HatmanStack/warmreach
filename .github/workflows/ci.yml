name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.13'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    name: Smoke Test (TypeCheck + Test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # Frontend
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci
      - name: Frontend TypeScript check
        working-directory: ./frontend
        run: npx tsc --noEmit
      - name: Frontend tests
        working-directory: ./frontend
        run: npm run test

      # Client
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: ./client
        run: npm ci
      - name: Client TypeScript check
        working-directory: ./client
        run: npx tsc --noEmit
      - name: Client tests
        working-directory: ./client
        run: npm run test

      # Backend
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: tests/backend/requirements*.txt
      - name: Install uv
        run: pip install uv
      - name: Install test dependencies
        working-directory: ./tests/backend
        run: uv pip install -r requirements-test.lock --system
      - name: Backend tests
        working-directory: ./tests/backend
        run: python -m pytest unit/ -v --tb=short
