name: API Docs Build

# Proves the generated API docs (typedoc for TS, mkdocstrings for Python) stay
# buildable from source. It does not publish — the output is generated in CI and
# discarded, so reference docs cannot silently break when source changes.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'client/src/**'
      - 'admin/src/**'
      - 'backend/lambdas/shared/python/**'
      - 'typedoc.base.json'
      - '*/typedoc.json'
      - 'backend/mkdocs.yml'
      - 'backend/docs-api/**'
      - 'package.json'
      - '.github/workflows/docs-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'client/src/**'
      - 'admin/src/**'
      - 'backend/lambdas/shared/python/**'
      - 'typedoc.base.json'
      - '*/typedoc.json'
      - 'backend/mkdocs.yml'
      - 'backend/docs-api/**'
      - 'package.json'
      - '.github/workflows/docs-api.yml'

permissions:
  contents: read

jobs:
  docs-api:
    name: Build API Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: npm ci
      - name: Generate TypeScript API docs
        run: npm run docs:api:ts
      - name: Generate Python API docs
        run: npm run docs:api:py
