name: Create Release

on:
  push:
    branches: [main]
    paths: [CHANGELOG.md]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Extract the latest RELEASED version from CHANGELOG.md. Match only
          # headings whose version starts with a digit so the Keep-a-Changelog
          # "## [Unreleased]" section is skipped (otherwise the version resolves
          # to the literal "Unreleased", which creates a bogus vUnreleased tag and
          # fails the electron build with `npm error Invalid version: Unreleased`).
          VERSION=$(grep -m1 -E '^## \[[0-9]' CHANGELOG.md | sed 's/^## \[\(.*\)\].*/\1/')
          if [ -z "$VERSION" ]; then
            echo "No version found in CHANGELOG.md"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Check if release already exists
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create tag if needed
        if: steps.version.outputs.skip != 'true' && steps.version.outputs.tag != ''
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Extract changelog
        if: steps.version.outputs.skip != 'true' && steps.version.outputs.version != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true' && steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md

  # Fan the release out to the community repo. Invoked here (not via
  # `on: release: published`) because GitHub does not emit the release event for
  # releases created by the default GITHUB_TOKEN above, so the event-based
  # trigger never fired and the community release was never created.
  sync:
    needs: release
    if: needs.release.outputs.skip != 'true' && needs.release.outputs.tag != ''
    uses: ./.github/workflows/release-sync.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets:
      WARMREACH_PUBLIC_DEPLOY_KEY: ${{ secrets.WARMREACH_PUBLIC_DEPLOY_KEY }}
      WARMREACH_PUBLIC_PAT: ${{ secrets.WARMREACH_PUBLIC_PAT }}

  # Build the AppImage and upload it to the community release. Depends on `sync`
  # so the community release exists before the upload (electron-release.yml also
  # waits for it as a safety net).
  electron:
    needs: [release, sync]
    if: needs.release.outputs.skip != 'true' && needs.release.outputs.tag != ''
    uses: ./.github/workflows/electron-release.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets:
      WARMREACH_PUBLIC_PAT: ${{ secrets.WARMREACH_PUBLIC_PAT }}
