name: Docs Lint

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '*.md'
      - '.markdownlint-cli2.jsonc'
      - 'lychee.toml'
      - '.github/workflows/docs-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '*.md'
      - '.markdownlint-cli2.jsonc'
      - 'lychee.toml'
      - '.github/workflows/docs-lint.yml'

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    # TODO(2026-04-30): flip continue-on-error to false once the baseline is
    # clean on main for one week. Non-blocking baseline ships with the
    # 2026-04-23 audit remediation plan (Phase 6 Task 10).
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - name: Run markdownlint
        run: npx markdownlint-cli2 "docs/**/*.md" "*.md"

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    # TODO(2026-04-30): flip continue-on-error to false once the baseline is
    # clean on main for one week. Non-blocking baseline ships with the
    # 2026-04-23 audit remediation plan (Phase 6 Task 10).
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config lychee.toml "docs/**/*.md" "*.md"
          fail: true
